<div class="row d-flex justify-content-center">
    <mat-form-field class="col-8 search-field" appearance="outline">
        <input matInput type="text" id="lastName" name="lastName" [(ngModel)]="enteredText" (keyup.enter)="search()">
        <mat-icon matSuffix (click)="search()">search</mat-icon>
    </mat-form-field>
</div>

<div>
    <div *ngFor="let user of users">
        <span>{{user.login}}</span>
    </div>
</div>
